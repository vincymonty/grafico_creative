<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="300">
    <title>Monitor Financeiro</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: black;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        img {
            width: 100vw;
            height: auto;
            max-height: 100vh;
            object-fit: contain;
        }
    </style>
</head>

<body>
    <img id="dashboard" src="grafico.jpg" alt="Gráfico Financeiro">

    <script>
        // Esse script adiciona um número único após o nome da imagem
        // Exemplo: grafico.jpg?v=123456789
        // Isso obriga a TV a baixar a versão mais recente do GitHub
        var imagem = document.getElementById('dashboard');
        var timestamp = faturar = new Date().getTime();
        imagem.src = "grafico.jpg?t=" + timestamp;
    </script>
</body>

</html>
